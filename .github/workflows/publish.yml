name: publish

on:
  schedule:
    # 05:00 UTC nightly.
    - cron: "0 5 * * *"
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write   # commit the refreshed json
  pages: write      # deploy it
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python generate.py --out config.json
      - name: Commit if changed
        run: |
          git config user.name "fmhy-config-bot"
          git config user.email "bot@fmhy-config.local"
          git add config.json
          if git diff --cached --quiet; then
            echo "no change"
          else
            git commit -m "config: nightly refresh"
            git push
          fi
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - id: deployed  ``
        uses: actions/deploy-pages@v5
